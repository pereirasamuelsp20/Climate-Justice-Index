<svg width="100%" viewBox="0 0 640 110" xmlns="http://www.w3.org/2000/svg" style="max-width:600px; animation:scaleIn 0.8s cubic-bezier(.16,1,.3,1) both;">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&amp;family=Syne:wght@700;800&amp;display=swap');
    @keyframes rotCW  { from{transform:rotate(0deg)}   to{transform:rotate(360deg)}  }
    @keyframes rotCCW { from{transform:rotate(0deg)}   to{transform:rotate(-360deg)} }
    @keyframes pulse  {
      0%,100%{ opacity:0; transform:scale(0.92); }
      25%    { opacity:0.35; }
      65%    { opacity:0; transform:scale(1.5); }
    }
    @keyframes fadeSlide {
      from{ opacity:0; transform:translateX(-10px); }
      to  { opacity:1; transform:translateX(0); }
    }
    @keyframes scaleIn {
      from{ opacity:0; transform:scale(0.82); }
      to  { opacity:1; transform:scale(1); }
    }
    @keyframes dotPop {
      0%,100%{ transform:scale(1);   opacity:0.9; }
      50%    { transform:scale(1.55); opacity:0.6; }
    }
    @keyframes lineGrow {
      from{ stroke-dashoffset: 120; }
      to  { stroke-dashoffset: 0; }
    }
    @keyframes shimTag {
      0%,100%{ opacity:0.55; }
      50%    { opacity:0.85; }
    }
  </style>
  <defs>
    <radialGradient id="pg" cx="36%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#3DD6A3"/>
      <stop offset="50%"  stop-color="#1A9E75"/>
      <stop offset="100%" stop-color="#062e20"/>
    </radialGradient>
    <radialGradient id="pglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1A9E75" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1A9E75" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="pclip"><circle cx="55" cy="55" r="36"/></clipPath>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#3DD6A3" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#3DD6A3" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3DD6A3" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- subtle glow halo -->
  <circle cx="55" cy="55" r="55" fill="url(#pglow)"/>

  <!-- pulse rings — very restrained -->
  <circle cx="55" cy="55" r="47" fill="none" stroke="#1A9E75" stroke-width="0.8"
    style="transform-origin:55px 55px; animation:pulse 4s ease-out infinite;"/>
  <circle cx="55" cy="55" r="47" fill="none" stroke="#1A9E75" stroke-width="0.8"
    style="transform-origin:55px 55px; animation:pulse 4s ease-out infinite 1.33s;"/>
  <circle cx="55" cy="55" r="47" fill="none" stroke="#1A9E75" stroke-width="0.8"
    style="transform-origin:55px 55px; animation:pulse 4s ease-out infinite 2.66s;"/>

  <!-- outer precision ring — very thin -->
  <circle cx="55" cy="55" r="51" fill="none" stroke="#1A9E75" stroke-width="0.4" opacity="0.3"/>

  <!-- orbit arcs — minimal, architectural -->
  <circle cx="55" cy="55" r="44" fill="none" stroke="#3DD6A3" stroke-width="1.2"
    stroke-dasharray="34 108" stroke-linecap="round"
    style="transform-origin:55px 55px; animation:rotCW 14s linear infinite;"/>
  <circle cx="55" cy="55" r="38" fill="none" stroke="#9FE1CB" stroke-width="0.8"
    stroke-dasharray="20 100" stroke-linecap="round"
    style="transform-origin:55px 55px; animation:rotCCW 10s linear infinite;"/>

  <!-- globe -->
  <circle cx="55" cy="55" r="36" fill="url(#pg)"/>

  <!-- lat/lon — ultra-fine -->
  <g clip-path="url(#pclip)" fill="none" stroke="#e8fff8" stroke-width="0.5" opacity="0.15">
    <ellipse cx="55" cy="55" rx="36" ry="10"/>
    <ellipse cx="55" cy="55" rx="30" ry="20"/>
    <ellipse cx="55" cy="55" rx="19" ry="30"/>
    <line x1="55" y1="19" x2="55" y2="91"/>
    <line x1="19" y1="55" x2="91" y2="55"/>
  </g>

  <!-- land -->
  <g clip-path="url(#pclip)" opacity="0.6">
    <ellipse cx="62" cy="60" rx="10" ry="14" fill="#03241a"/>
    <ellipse cx="44" cy="47" rx="13" ry="6"  fill="#03241a"/>
    <ellipse cx="36" cy="62" rx="6"  ry="11" fill="#03241a"/>
    <ellipse cx="73" cy="50" rx="5"  ry="3"  fill="#03241a"/>
  </g>

  <!-- specular highlight -->
  <ellipse cx="43" cy="41" rx="10" ry="6" fill="#9FE1CB" opacity="0.12"/>

  <!-- globe border — hair-thin -->
  <circle cx="55" cy="55" r="36" fill="none" stroke="#3DD6A3" stroke-width="1" opacity="0.7"/>

  <!-- data nodes — small, precise -->
  <circle cx="40" cy="46" r="3.5" fill="#F4845F" opacity="0.95"
    style="transform-origin:40px 46px; animation:dotPop 3.2s ease-in-out infinite;"/>
  <circle cx="68" cy="43" r="2.5" fill="#b8a9f0" opacity="0.9"
    style="transform-origin:68px 43px; animation:dotPop 3.2s ease-in-out infinite 1.1s;"/>
  <circle cx="50" cy="68" r="3"   fill="#F4845F" opacity="0.85"
    style="transform-origin:50px 68px; animation:dotPop 3.2s ease-in-out infinite 0.55s;"/>
  <circle cx="63" cy="63" r="2"   fill="#9FE1CB" opacity="0.9"
    style="transform-origin:63px 63px; animation:dotPop 3.2s ease-in-out infinite 2s;"/>

  <!-- thin connector lines -->
  <line x1="40" y1="46" x2="50" y2="68" stroke="#3DD6A3" stroke-width="0.6" opacity="0.4"
    stroke-dasharray="120" style="animation:lineGrow 1.8s ease-out 1.2s both;"/>
  <line x1="68" y1="43" x2="63" y2="63" stroke="#3DD6A3" stroke-width="0.6" opacity="0.4"
    stroke-dasharray="120" style="animation:lineGrow 1.8s ease-out 1.5s both;"/>

  <!-- ── WORDMARK ── -->
  <!-- thin vertical separator -->
  <rect x="120" y="22" width="1" height="66" rx="0.5" fill="url(#lineGrad)" opacity="0.4"/>

  <!-- "CLIMATE" — display weight, tracked -->
  <text x="137" y="58"
    font-family="'Syne', 'Arial Black', sans-serif"
    font-size="38" font-weight="800" fill="#3DD6A3"
    letter-spacing="-0.5"
    style="animation:fadeSlide 0.7s cubic-bezier(.16,1,.3,1) 0.15s both;">CLIMATE</text>

  <!-- "JUSTICE INDEX" — lighter weight, white, slightly smaller -->
  <text x="137" y="90"
    font-family="'Syne', 'Arial Black', sans-serif"
    font-size="33" font-weight="700" fill="#ffffff"
    letter-spacing="2"
    style="animation:fadeSlide 0.7s cubic-bezier(.16,1,.3,1) 0.3s both;">JUSTICE INDEX</text>

  <!-- tagline — ultra-thin, spaced -->
  <text x="138" y="106"
    font-family="'DM Sans', system-ui, sans-serif"
    font-size="9" font-weight="300" fill="#3DD6A3"
    letter-spacing="4" opacity="0.65"
    style="animation:shimTag 3s ease-in-out infinite 1s;">REAL-TIME VULNERABILITY TRACKING</text>
</svg>
