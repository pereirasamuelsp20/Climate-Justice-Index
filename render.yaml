services:
  - type: web
    name: climate-justice-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: FRONTEND_URL
        value: https://climate-justice-index.vercel.app
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENWEATHER_KEY
        sync: false
      - key: TOMORROW_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
