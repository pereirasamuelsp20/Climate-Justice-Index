<!--
  INSTRUCTIONS:
  1. Go to Supabase Dashboard → Authentication → Email Templates
  2. Click "Confirm signup"
  3. Set Subject to: Verify your email
  4. Replace the Body with everything below this comment
  5. Click Save
-->

<div style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #0f1117;">
  <div style="max-width: 600px; margin: 0 auto; background-color: #161923; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.06);">
    
    <!-- Header -->
    <div style="background: linear-gradient(135deg, #1e3a5f 0%, #0f1117 50%, #1a2332 100%); padding: 48px 40px; text-align: center;">
      <div style="width: 64px; height: 64px; border-radius: 50%; background: radial-gradient(circle at 38% 32%, #5DCAA5, #1D9E75, #04342C); margin: 0 auto 20px; border: 3px solid rgba(93, 202, 165, 0.4);"></div>
      <h1 style="color: #ffffff; margin: 0 0 8px 0; font-size: 24px; font-weight: 700;">
        Confirm Your Account
      </h1>
      <p style="color: #94a3b8; margin: 0; font-size: 14px;">
        You're almost ready to get started
      </p>
    </div>

    <!-- Body -->
    <div style="padding: 40px;">
      <p style="color: #e2e8f0; font-size: 16px; margin: 0 0 16px 0; line-height: 1.7;">
        Thanks for signing up! Please confirm your email address by clicking the button below.
      </p>

      <!-- CTA Button -->
      <div style="text-align: center; padding: 24px 0;">
        <a href="{{ .ConfirmationURL }}" style="display: inline-block; background: linear-gradient(135deg, #3b82f6, #2563eb); color: #ffffff; padding: 14px 36px; text-decoration: none; border-radius: 10px; font-weight: 700; font-size: 15px;">
          Verify Email Address
        </a>
      </div>

      <p style="color: #475569; font-size: 12px; margin: 24px 0 0 0; line-height: 1.6; text-align: center;">
        Or copy this link:<br/>
        <a href="{{ .ConfirmationURL }}" style="color: #60a5fa; word-break: break-all; font-size: 11px;">{{ .ConfirmationURL }}</a>
      </p>
    </div>

    <!-- Footer -->
    <div style="background: rgba(0,0,0,0.2); padding: 20px 40px; text-align: center;">
      <p style="color: #334155; font-size: 11px; margin: 0;">
        If you did not create an account, you can safely ignore this email.
      </p>
    </div>
  </div>
</div>
