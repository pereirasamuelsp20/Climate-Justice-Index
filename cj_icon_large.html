
<style>
  .icon-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    padding: 40px 0;
  }
  .icon-label {
    font-family: system-ui, sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--color-text-secondary);
    text-transform: uppercase;
    margin-top: -20px;
  }
  .sizes-row {
    display: flex;
    align-items: center;
    gap: 32px;
  }

  @keyframes spinOrbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes spinOrbitRev { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
  @keyframes pulseRing {
    0%, 100% { opacity: 0; transform: scale(0.88); }
    25% { opacity: 0.5; }
    70% { opacity: 0; transform: scale(1.4); }
  }
  @keyframes dotBeat { 0%,100% { r: 7; opacity:1; } 50% { r: 10; opacity:0.6; } }
  @keyframes dotBeat2 { 0%,100% { r: 5; opacity:1; } 50% { r: 8; opacity:0.5; } }
  @keyframes dotBeat3 { 0%,100% { r: 6; opacity:1; } 50% { r: 9; opacity:0.6; } }
  @keyframes popIn {
    from { opacity:0; transform: scale(0.6); }
    to { opacity:1; transform: scale(1); }
  }
</style>

<div class="icon-wrap">

  <!-- MAIN LARGE ICON -->
  <svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg" style="animation: popIn 0.7s ease-out both;">
    <defs>
      <radialGradient id="g1" cx="38%" cy="32%" r="62%">
        <stop offset="0%" stop-color="#5DCAA5"/>
        <stop offset="55%" stop-color="#1D9E75"/>
        <stop offset="100%" stop-color="#04342C"/>
      </radialGradient>
      <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#1D9E75" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#1D9E75" stop-opacity="0"/>
      </radialGradient>
      <clipPath id="gc1"><circle cx="110" cy="110" r="68"/></clipPath>
    </defs>

    <!-- Outer glow -->
    <circle cx="110" cy="110" r="108" fill="url(#glow1)"/>

    <!-- Pulse rings -->
    <circle cx="110" cy="110" r="86" fill="none" stroke="#1D9E75" stroke-width="1.5"
      style="transform-origin:110px 110px; animation: pulseRing 3s ease-out infinite;"/>
    <circle cx="110" cy="110" r="86" fill="none" stroke="#1D9E75" stroke-width="1.5"
      style="transform-origin:110px 110px; animation: pulseRing 3s ease-out infinite 1s;"/>
    <circle cx="110" cy="110" r="86" fill="none" stroke="#1D9E75" stroke-width="1.5"
      style="transform-origin:110px 110px; animation: pulseRing 3s ease-out infinite 2s;"/>

    <!-- Spinning orbit arcs -->
    <circle cx="110" cy="110" r="93" fill="none" stroke="#5DCAA5" stroke-width="3"
      stroke-dasharray="80 210" stroke-linecap="round"
      style="transform-origin:110px 110px; animation: spinOrbit 11s linear infinite;"/>
    <circle cx="110" cy="110" r="82" fill="none" stroke="#AFA9EC" stroke-width="2.5"
      stroke-dasharray="55 200" stroke-linecap="round"
      style="transform-origin:110px 110px; animation: spinOrbitRev 8s linear infinite;"/>
    <circle cx="110" cy="110" r="100" fill="none" stroke="#F09995" stroke-width="2"
      stroke-dasharray="40 250" stroke-linecap="round"
      style="transform-origin:110px 110px; animation: spinOrbit 15s linear infinite;"/>

    <!-- Outer dashed ring -->
    <circle cx="110" cy="110" r="75" fill="none" stroke="#0F6E56" stroke-width="0.8" stroke-dasharray="3 5" opacity="0.5"/>

    <!-- Globe -->
    <circle cx="110" cy="110" r="68" fill="url(#g1)"/>

    <!-- Lat/long grid -->
    <g clip-path="url(#gc1)" fill="none" stroke="#E1F5EE" stroke-width="0.8" opacity="0.2">
      <ellipse cx="110" cy="110" rx="68" ry="19"/>
      <ellipse cx="110" cy="110" rx="60" ry="36"/>
      <ellipse cx="110" cy="110" rx="45" ry="50"/>
      <ellipse cx="110" cy="110" rx="24" ry="62"/>
      <line x1="110" y1="42" x2="110" y2="178"/>
      <line x1="42" y1="110" x2="178" y2="110"/>
    </g>

    <!-- Land masses -->
    <g clip-path="url(#gc1)" fill="#04342C" opacity="0.65">
      <ellipse cx="118" cy="116" rx="15" ry="22"/>
      <ellipse cx="94" cy="96" rx="19" ry="10"/>
      <ellipse cx="80" cy="118" rx="9" ry="17"/>
      <ellipse cx="138" cy="104" rx="7" ry="5"/>
      <ellipse cx="130" cy="128" rx="6" ry="4"/>
    </g>

    <!-- Highlight -->
    <ellipse cx="92" cy="88" rx="18" ry="11" fill="#9FE1CB" opacity="0.15"/>

    <!-- Globe border -->
    <circle cx="110" cy="110" r="68" fill="none" stroke="#5DCAA5" stroke-width="2" opacity="0.8"/>

    <!-- Data hotspot dots -->
    <circle cx="85" cy="93" r="7" fill="#F0997B" stroke="#FAECE7" stroke-width="1.5"
      style="transform-origin:85px 93px; animation: dotBeat 2.8s ease-in-out infinite;"/>
    <circle cx="138" cy="88" r="5" fill="#F09995" stroke="#FCEBEB" stroke-width="1.5"
      style="transform-origin:138px 88px; animation: dotBeat2 2.8s ease-in-out infinite 1s;"/>
    <circle cx="100" cy="135" r="6" fill="#F0997B" stroke="#FAECE7" stroke-width="1.5"
      style="transform-origin:100px 135px; animation: dotBeat3 2.8s ease-in-out infinite 0.5s;"/>
    <circle cx="128" cy="126" r="4" fill="#FAC775" stroke="#FAEEDA" stroke-width="1.5"
      style="transform-origin:128px 126px; animation: dotBeat2 2.8s ease-in-out infinite 1.8s;"/>
    <circle cx="118" cy="103" r="4" fill="#C0DD97" stroke="#EAF3DE" stroke-width="1.5"
      style="transform-origin:118px 103px; animation: dotBeat2 2.8s ease-in-out infinite 2.2s;"/>

    <!-- Connector lines -->
    <line x1="85" y1="93" x2="100" y2="135" stroke="#5DCAA5" stroke-width="1" opacity="0.6"/>
    <line x1="138" y1="88" x2="128" y2="126" stroke="#5DCAA5" stroke-width="1" opacity="0.6"/>
    <line x1="85" y1="93" x2="138" y2="88" stroke="#AFA9EC" stroke-width="0.8" opacity="0.5"/>
  </svg>

  <p class="icon-label">Primary icon — 220px</p>

  <!-- SIZE VARIANTS ROW -->
  <div class="sizes-row">

    <!-- 96px -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
      <svg width="96" height="96" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="g2" cx="38%" cy="32%" r="62%">
            <stop offset="0%" stop-color="#5DCAA5"/>
            <stop offset="100%" stop-color="#04342C"/>
          </radialGradient>
          <clipPath id="gc2"><circle cx="110" cy="110" r="68"/></clipPath>
        </defs>
        <circle cx="110" cy="110" r="68" fill="url(#g2)"/>
        <g clip-path="url(#gc2)" fill="none" stroke="#E1F5EE" stroke-width="0.8" opacity="0.2">
          <ellipse cx="110" cy="110" rx="68" ry="19"/>
          <ellipse cx="110" cy="110" rx="45" ry="50"/>
          <line x1="110" y1="42" x2="110" y2="178"/>
        </g>
        <g clip-path="url(#gc2)" fill="#04342C" opacity="0.65">
          <ellipse cx="118" cy="116" rx="15" ry="22"/>
          <ellipse cx="94" cy="96" rx="19" ry="10"/>
          <ellipse cx="80" cy="118" rx="9" ry="17"/>
        </g>
        <circle cx="110" cy="110" r="68" fill="none" stroke="#5DCAA5" stroke-width="2.5"/>
        <circle cx="85" cy="93" r="8" fill="#F0997B" stroke="#FAECE7" stroke-width="2"
          style="transform-origin:85px 93px; animation: dotBeat 2.8s ease-in-out infinite;"/>
        <circle cx="138" cy="88" r="6" fill="#AFA9EC" stroke="#EEEDFE" stroke-width="2"
          style="transform-origin:138px 88px; animation: dotBeat2 2.8s ease-in-out infinite 1s;"/>
        <circle cx="100" cy="135" r="7" fill="#F09995" stroke="#FCEBEB" stroke-width="2"
          style="transform-origin:100px 135px; animation: dotBeat3 2.8s ease-in-out infinite 0.5s;"/>
      </svg>
      <span class="icon-label" style="margin-top:0;">96px</span>
    </div>

    <!-- 64px -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
      <svg width="64" height="64" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="g3" cx="38%" cy="32%" r="62%">
            <stop offset="0%" stop-color="#5DCAA5"/>
            <stop offset="100%" stop-color="#04342C"/>
          </radialGradient>
          <clipPath id="gc3"><circle cx="110" cy="110" r="68"/></clipPath>
        </defs>
        <circle cx="110" cy="110" r="68" fill="url(#g3)"/>
        <g clip-path="url(#gc3)" fill="#04342C" opacity="0.65">
          <ellipse cx="118" cy="116" rx="15" ry="22"/>
          <ellipse cx="94" cy="96" rx="19" ry="10"/>
          <ellipse cx="80" cy="118" rx="9" ry="17"/>
        </g>
        <circle cx="110" cy="110" r="68" fill="none" stroke="#5DCAA5" stroke-width="3"/>
        <circle cx="85" cy="93" r="9" fill="#F0997B" stroke="#FAECE7" stroke-width="2.5"
          style="transform-origin:85px 93px; animation: dotBeat 2.8s ease-in-out infinite;"/>
        <circle cx="138" cy="88" r="7" fill="#AFA9EC" stroke="#EEEDFE" stroke-width="2"
          style="transform-origin:138px 88px; animation: dotBeat2 2.8s ease-in-out infinite 1s;"/>
      </svg>
      <span class="icon-label" style="margin-top:0;">64px</span>
    </div>

    <!-- 40px (favicon) -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
      <svg width="40" height="40" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="g4" cx="38%" cy="32%" r="62%">
            <stop offset="0%" stop-color="#5DCAA5"/>
            <stop offset="100%" stop-color="#04342C"/>
          </radialGradient>
          <clipPath id="gc4"><circle cx="110" cy="110" r="68"/></clipPath>
        </defs>
        <circle cx="110" cy="110" r="68" fill="url(#g4)"/>
        <g clip-path="url(#gc4)" fill="#04342C" opacity="0.7">
          <ellipse cx="118" cy="116" rx="15" ry="22"/>
          <ellipse cx="94" cy="96" rx="19" ry="10"/>
          <ellipse cx="80" cy="118" rx="9" ry="17"/>
        </g>
        <circle cx="110" cy="110" r="68" fill="none" stroke="#5DCAA5" stroke-width="4"/>
        <circle cx="85" cy="93" r="10" fill="#F0997B"/>
      </svg>
      <span class="icon-label" style="margin-top:0;">favicon</span>
    </div>

  </div>
</div>
